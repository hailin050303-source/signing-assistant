<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>签售小助手 🎀</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", sans-serif;
  background: linear-gradient(160deg, #f0e4ff 0%, #ffe4f3 100%);
  min-height: 100vh;
  padding: 20px 16px 48px;
  color: #3d2052;
}

h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.subtitle {
  font-size: 13px;
  color: #9b7db5;
  margin-bottom: 20px;
}

/* speed bar */
.spd-bar {
  background: white;
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(180,100,255,.1);
}
.spd-bar label { font-size: 13px; color: #7b2fbe; white-space: nowrap; font-weight: 600; }
.spd-bar input { flex: 1; accent-color: #c77dff; }
.spd-bar span { font-size: 13px; font-weight: 700; color: #3d2052; width: 30px; text-align: right; }

/* warn */
.warn {
  background: #fff8e1;
  border: 1px solid #ffd54f;
  border-radius: 12px;
  padding: 11px 14px;
  font-size: 12px;
  color: #795548;
  line-height: 1.6;
  margin-bottom: 16px;
  display: none;
}

/* cards */
.card {
  background: white;
  border-radius: 16px;
  padding: 0;
  margin-bottom: 10px;
  box-shadow: 0 2px 10px rgba(180,100,255,.1);
  overflow: hidden;
  border: 2px solid transparent;
  transition: border-color .15s;
}
.card.playing { border-color: #c77dff; }

.card-top {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 15px;
}
.num {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: #edd5ff;
  color: #7b2fbe;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card.playing .num {
  background: linear-gradient(135deg, #ff6b9d, #c77dff);
  color: white;
}
.texts { flex: 1; min-width: 0; }
.zh { font-size: 14px; font-weight: 600; color: #3d2052; margin-bottom: 3px; line-height: 1.4; }
.kr { font-size: 12px; color: #9b7db5; line-height: 1.5; }

.play-btn {
  flex-shrink: 0;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #ff6b9d, #c77dff);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(199,125,255,.4);
  transition: opacity .15s, transform .1s;
}
.play-btn:active { transform: scale(.93); }
.card.playing .play-btn { background: linear-gradient(135deg, #c77dff, #7b2fbe); }

/* progress bar inside card */
.prog-bar {
  height: 3px;
  background: #edd5ff;
  display: none;
}
.prog-bar.on { display: block; }
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff6b9d, #c77dff);
  width: 0%;
  transition: width .1s linear;
}

/* bottom controls */
.bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(10px);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  box-shadow: 0 -2px 16px rgba(180,100,255,.15);
}
.bot-btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.bot-btn.prev { background: #edd5ff; color: #7b2fbe; }
.bot-btn.next { background: linear-gradient(90deg, #ff6b9d, #c77dff); color: white; }
.bot-btn:disabled { opacity: .35; cursor: default; }
</style>
</head>
<body>

<h1>🎀 签售小助手</h1>
<p class="subtitle">点击每条右侧按钮播放，或用底部按钮顺序朗读</p>

<div class="spd-bar">
  <label>语速</label>
  <input type="range" id="spdR" min="0.5" max="1.3" step="0.05" value="0.85">
  <span id="spdV">0.85</span>
</div>

<div class="warn" id="warn"></div>

<div id="cards"></div>

<div class="bottom">
  <button class="bot-btn prev" id="btnPrev" onclick="go(cur-1)">⏮ 上一条</button>
  <button class="bot-btn next" id="btnNext" onclick="go(cur+1)">下一条 ⏭</button>
</div>

<script>
var TRACKS = [
  { zh: "SOEE呀～我是中国的海淋姐姐",
    kr: "SOEE야~ 나는 중국의 하이린 언니야" },
  { zh: "约定pose吧！（比动作）这个是"H"的一半",
    kr: "우리 약속 포즈 정하자! 이건 H의 반쪽이야~" },
  { zh: "端午节，所以姐姐穿了中国传统服饰，怎么样？",
    kr: "오늘은 단오절이라서 언니가 중국 전통 의상 입고 왔는데 어때?" },
  { zh: "这次短发真是Legend…姐姐第一次看到心脏都要停止了！",
    kr: "이번 단발 진짜 레전드였어…처음 봤을 때 언니가 심장 멎는 줄 알았다니까?!" },
  { zh: "新歌超级好听，能感觉到你准备得很努力！辛苦啦我的宝宝！",
    kr: "신곡도 완전 대박이고,우리 소이가 얼마나 열심히 준비했는지 다 느껴져!고생했어 우리 아기!" },
  { zh: "姐姐这一年也努力地生活了哦。记得姐姐一直在用心运营你的中国粉丝账号吧？现在粉丝快突破400人啦！",
    kr: "언니도 지난 1년 동안 진짜 열심히 살았어!언니가 소이 중국 팬 계정 마음 담아서 계속 운영하고 있는 거 기억하지? 벌써 팔로워가 400명 돌파 직전이야!" },
  { zh: "这个账号帮助我成为了网易云音乐负责KPOP宣传的实习生",
    kr: "이 계정 덕분에 언니가 넷이즈뮤직에서 K-POP 홍보 담당 인턴까지 하게 됐어." },
  { zh: "USPEER网易云的视频姐姐也是第一个看到的，太幸福了都没法专心工作了",
    kr: "그리고 USPEER 넷이즈뮤직 영상도 언니가 제일 먼저 봤어!너무 행복해서 일에 집중을 못 하겠더라구." },
  { zh: "姐姐最近工作太累了，分别用女朋友和妹妹的方式来说一句话和一个动作安慰我吧！",
    kr: "언니가 요즘 일 때문에 너무 지쳤는데,여자친구 버전이랑 여동생 버전으로 위로의 말 한마디랑 포즈 하나씩만 해줄수 있어?" },
  { zh: "（举牌）女朋友版本",
    kr: "여자친구 버전" },
  { zh: "（举牌）妹妹版本",
    kr: "여동생 버전" },
  { zh: "要好好吃饭好好睡觉哦。姐姐会一直应援的！最爱你！下周见！",
    kr: "밥 잘 챙겨 먹고,잠도 잘 자야 해!언니는 앞으로도 계속 응원할게!진짜 많이 사랑해!다음 주에 또 만나자~" }
];

var cur = -1;
var rate = 0.85;
var utter = null;
var progTimers = [];
var koVoice = null;

// find Korean voice
function findVoice() {
  var vs = window.speechSynthesis.getVoices();
  var ko = vs.filter(function(v) { return v.lang && v.lang.toLowerCase().startsWith('ko'); });
  if (ko.length) koVoice = ko[0];
  // check if any voice at all
  if (!vs.length) {
    document.getElementById('warn').style.display = 'block';
    document.getElementById('warn').textContent = '⚠️ 未检测到系统语音，请确认浏览器已允许语音功能。Mac 用户请在「系统设置 → 辅助功能 → 朗读内容」下载韩语语音包。';
  } else if (!ko.length) {
    document.getElementById('warn').style.display = 'block';
    document.getElementById('warn').textContent = '⚠️ 未找到韩语语音包，播放时会用默认语音。Mac：系统设置 → 辅助功能 → 朗读内容 → 系统声音 → 下载韩语。';
  }
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = findVoice;
  findVoice();
}

// speed
document.getElementById('spdR').addEventListener('input', function() {
  rate = parseFloat(this.value);
  document.getElementById('spdV').textContent = rate.toFixed(2);
});

// render cards
var container = document.getElementById('cards');
TRACKS.forEach(function(t, i) {
  var card = document.createElement('div');
  card.className = 'card';
  card.id = 'card' + i;
  card.innerHTML =
    '<div class="card-top">' +
      '<div class="num" id="num' + i + '">' + (i+1) + '</div>' +
      '<div class="texts">' +
        '<div class="zh">' + t.zh + '</div>' +
        '<div class="kr">' + t.kr + '</div>' +
      '</div>' +
      '<button class="play-btn" id="pbtn' + i + '" onclick="tap(' + i + ')">▶</button>' +
    '</div>' +
    '<div class="prog-bar" id="prog' + i + '"><div class="prog-fill" id="fill' + i + '"></div></div>';
  container.appendChild(card);
});

function tap(i) {
  // if already playing this one → stop
  if (cur === i && window.speechSynthesis && !window.speechSynthesis.paused && window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    stopUI(i);
    cur = -1;
    return;
  }
  go(i);
}

function go(i) {
  if (i < 0 || i >= TRACKS.length) return;
  if (!window.speechSynthesis) {
    alert('您的浏览器不支持语音朗读，请用 Chrome 或 Safari 打开。');
    return;
  }
  // stop current
  if (cur >= 0) stopUI(cur);
  window.speechSynthesis.cancel();
  cur = i;

  // update nav buttons
  document.getElementById('btnPrev').disabled = i === 0;
  document.getElementById('btnNext').disabled = i === TRACKS.length - 1;

  // scroll into view
  var el = document.getElementById('card' + i);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // start speaking
  var u = new SpeechSynthesisUtterance(TRACKS[i].kr);
  u.lang = 'ko-KR';
  u.rate = rate;
  if (koVoice) u.voice = koVoice;
  utter = u;

  // start UI
  startUI(i);

  u.onend = function() {
    stopUI(i);
    // auto next
    if (i < TRACKS.length - 1) {
      setTimeout(function() { go(i + 1); }, 400);
    } else {
      cur = -1;
    }
  };
  u.onerror = function() { stopUI(i); cur = -1; };

  window.speechSynthesis.speak(u);

  // animate progress bar (estimated)
  var estMs = Math.max(1000, (TRACKS[i].kr.length / 4) * 1000 / rate);
  var fill = document.getElementById('fill' + i);
  var start = Date.now();
  clearInterval(progTimers[i]);
  progTimers[i] = setInterval(function() {
    var p = Math.min(98, ((Date.now() - start) / estMs) * 100);
    fill.style.width = p + '%';
  }, 80);
}

function startUI(i) {
  var card = document.getElementById('card' + i);
  card.classList.add('playing');
  document.getElementById('pbtn' + i).textContent = '⏸';
  document.getElementById('prog' + i).classList.add('on');
}

function stopUI(i) {
  var card = document.getElementById('card' + i);
  card.classList.remove('playing');
  document.getElementById('pbtn' + i).textContent = '▶';
  document.getElementById('prog' + i).classList.remove('on');
  document.getElementById('fill' + i).style.width = '0%';
  clearInterval(progTimers[i]);
}

// init nav
document.getElementById('btnPrev').disabled = true;
document.getElementById('btnNext').disabled = true;
</script>
</body>
</html>
