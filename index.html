<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>签售小助手 🎀</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", sans-serif;
  background: linear-gradient(160deg, #f0e4ff 0%, #ffe4f3 100%);
  min-height: 100vh;
  padding: 20px 16px 40px;
  color: #3d2052;
}
h1 { font-size: 20px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

#loadScreen { text-align: center; padding: 60px 20px; }
#loadScreen p { font-size: 15px; color: #7b2fbe; margin-bottom: 8px; }
#loadBar { width: 100%; height: 8px; background: #edd5ff; border-radius: 4px; margin: 20px 0; overflow: hidden; }
#loadFill { height: 100%; background: linear-gradient(90deg, #ff6b9d, #c77dff); border-radius: 4px; width: 0%; transition: width 0.3s; }
#loadStatus { font-size: 13px; color: #9b7db5; }

#player { display: none; }

.np {
  background: linear-gradient(135deg, #7b2fbe, #c73b8c);
  border-radius: 20px; padding: 20px; color: white;
  margin-bottom: 16px; position: relative; overflow: hidden;
}
.np::after { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,.08); }
.np-label { font-size: 9px; letter-spacing: 2px; opacity: .7; margin-bottom: 6px; }
.np-zh { font-size: 18px; font-weight: 700; line-height: 1.35; margin-bottom: 4px; }
.np-kr { font-size: 12px; opacity: .72; line-height: 1.5; margin-bottom: 16px; }
.controls { display: flex; align-items: center; gap: 12px; }
.btn-side { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.2); border: none; color: white; font-size: 18px; cursor: pointer; }
.btn-side:disabled { opacity: .3; cursor: default; }
.btn-main { width: 58px; height: 58px; border-radius: 50%; background: white; border: none; color: #7b2fbe; font-size: 26px; cursor: pointer; box-shadow: 0 3px 12px rgba(0,0,0,.2); flex-shrink: 0; }
.np-info { flex: 1; }
.np-track { font-size: 11px; opacity: .7; margin-bottom: 5px; }
.bar-bg { height: 4px; background: rgba(255,255,255,.25); border-radius: 2px; cursor: pointer; }
.bar-fill { height: 100%; background: white; border-radius: 2px; width: 0%; transition: width .1s; }

.queue-title { font-size: 12px; font-weight: 700; color: #9b7db5; letter-spacing: 1px; margin-bottom: 10px; }
.item {
  display: flex; align-items: center; gap: 12px;
  background: white; border-radius: 14px; padding: 13px 15px;
  margin-bottom: 8px; border: 2px solid transparent; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.05); transition: border-color .15s;
  -webkit-user-select: none; user-select: none;
}
.item:active { transform: scale(.98); }
.item.cur { border-color: #c77dff; background: #f8f0ff; }
.item-num {
  width: 30px; height: 30px; border-radius: 50%;
  background: #edd5ff; color: #7b2fbe;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.item.cur .item-num { background: linear-gradient(135deg, #ff6b9d, #c77dff); color: white; }
.item-body { flex: 1; min-width: 0; }
.item-zh { font-size: 14px; font-weight: 600; color: #3d2052; margin-bottom: 2px; }
.item-kr { font-size: 11px; color: #9b7db5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-icon { font-size: 16px; color: #c77dff; width: 22px; text-align: center; flex-shrink: 0; }

.error-tip {
  background: #fff8e1; border: 1px solid #ffd54f;
  border-radius: 12px; padding: 12px 14px;
  font-size: 13px; color: #795548; line-height: 1.6;
  margin-bottom: 16px; display: none;
}
</style>
</head>
<body>

<h1>🎀 签售小助手</h1>

<div id="loadScreen">
  <p>正在生成韩语语音，请稍等...</p>
  <div id="loadBar"><div id="loadFill"></div></div>
  <div id="loadStatus">准备中...</div>
</div>

<div id="errorTip" class="error-tip">
  ⚠️ 部分语音加载失败（网络限制）。可用的台词正常播放，❌ 的条目会自动跳过。建议在网络稳定时刷新重试。
</div>

<div id="player">
  <div class="np">
    <div class="np-label">NOW PLAYING</div>
    <div class="np-zh" id="npZh">-</div>
    <div class="np-kr" id="npKr">-</div>
    <div class="controls">
      <button class="btn-side" id="btnPrev" onclick="go(cur-1)">⏮</button>
      <button class="btn-main" id="btnPlay" onclick="togglePlay()">▶</button>
      <button class="btn-side" id="btnNext" onclick="go(cur+1)">⏭</button>
      <div class="np-info">
        <div class="np-track" id="npTrack">-</div>
        <div class="bar-bg" onclick="seek(event)"><div class="bar-fill" id="barFill"></div></div>
      </div>
    </div>
  </div>
  <div class="queue-title">📋 播放列表</div>
  <div id="qList"></div>
</div>

<audio id="audio"></audio>

<script>
var TRACKS = [
  { zh: "SOEE呀～我是中国的海淋姐姐",
    kr: "SOEE야~ 나는 중국의 하이린 언니야" },
  { zh: "约定pose吧！（比动作）这个是"H"的一半",
    kr: "우리 약속 포즈 정하자! 이건 H의 반쪽이야~" },
  { zh: "端午节，所以姐姐穿了中国传统服饰，怎么样？",
    kr: "오늘은 단오절이라서 언니가 중국 전통 의상 입고 왔는데 어때?" },
  { zh: "这次短发真是Legend…姐姐第一次看到心脏都要停止了！",
    kr: "이번 단발 진짜 레전드였어…처음 봤을 때 언니가 심장 멎는 줄 알았다니까?!" },
  { zh: "新歌超级好听，能感觉到你准备得很努力！辛苦啦我的宝宝！",
    kr: "신곡도 완전 대박이고,우리 소이가 얼마나 열심히 준비했는지 다 느껴져!고생했어 우리 아기!" },
  { zh: "姐姐这一年也努力地生活了哦。记得姐姐一直在用心运营你的中国粉丝账号吧？现在粉丝快突破400人啦！",
    kr: "언니도 지난 1년 동안 진짜 열심히 살았어!언니가 소이 중국 팬 계정 마음 담아서 계속 운영하고 있는 거 기억하지? 벌써 팔로워가 400명 돌파 직전이야!" },
  { zh: "这个账号帮助我成为了网易云音乐负责KPOP宣传的实习生",
    kr: "이 계정 덕분에 언니가 넷이즈뮤직에서 K-POP 홍보 담당 인턴까지 하게 됐어." },
  { zh: "USPEER网易云的视频姐姐也是第一个看到的，太幸福了都没法专心工作了ㅠㅠ",
    kr: "그리고 USPEER 넷이즈뮤직 영상도 언니가 제일 먼저 봤어!너무 행복해서 일에 집중을 못 하겠더라구." },
  { zh: "姐姐最近工作太累了，分别用女朋友和妹妹的方式来说一句话和一个动作安慰我吧！",
    kr: "언니가 요즘 일 때문에 너무 지쳤는데,여자친구 버전이랑 여동생 버전으로 위로의 말 한마디랑 포즈 하나씩만 해줄수 있어?" },
  { zh: "（举牌）女朋友版本",
    kr: "여자친구 버전" },
  { zh: "（举牌）妹妹版本",
    kr: "여동생 버전" },
  { zh: "要好好吃饭好好睡觉哦。姐姐会一直应援的！最爱你！下周见！",
    kr: "밥 잘 챙겨 먹고,잠도 잘 자야 해!언니는 앞으로도 계속 응원할게!진짜 많이 사랑해!다음 주에 또 만나자~" }
];

function ttsUrl(text) {
  return 'https://translate.googleapis.com/translate_tts?ie=UTF-8&q='
    + encodeURIComponent(text) + '&tl=ko&client=gtx&ttsspeed=0.8';
}

var audioData = new Array(TRACKS.length).fill(null);
var cur = 0;
var audio = document.getElementById('audio');
var hasError = false;

async function loadAll() {
  for (var i = 0; i < TRACKS.length; i++) {
    var pct = Math.round((i / TRACKS.length) * 100);
    document.getElementById('loadFill').style.width = pct + '%';
    document.getElementById('loadStatus').textContent = '第 ' + (i+1) + ' 条：' + TRACKS[i].zh;
    try {
      var resp = await fetch(ttsUrl(TRACKS[i].kr));
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var blob = await resp.blob();
      audioData[i] = URL.createObjectURL(blob);
    } catch(e) {
      audioData[i] = null;
      hasError = true;
    }
  }
  document.getElementById('loadFill').style.width = '100%';
  document.getElementById('loadStatus').textContent = '✅ 全部加载完成！';
  setTimeout(function() {
    document.getElementById('loadScreen').style.display = 'none';
    document.getElementById('player').style.display = 'block';
    if (hasError) document.getElementById('errorTip').style.display = 'block';
    renderQueue();
    loadTrack(0, false);
  }, 600);
}

function loadTrack(i, autoplay) {
  cur = i;
  var t = TRACKS[i];
  document.getElementById('npZh').textContent = t.zh;
  document.getElementById('npKr').textContent = t.kr;
  document.getElementById('npTrack').textContent = '第 ' + (i+1) + ' 条 / 共 ' + TRACKS.length + ' 条';
  document.getElementById('btnPrev').disabled = i === 0;
  document.getElementById('btnNext').disabled = i === TRACKS.length - 1;
  document.getElementById('barFill').style.width = '0%';
  document.getElementById('btnPlay').textContent = '▶';
  renderQueue();
  if (audioData[i]) {
    audio.src = audioData[i];
    if (autoplay) audio.play();
  }
}

function togglePlay() {
  if (!audioData[cur]) return;
  if (audio.paused) { audio.play(); }
  else { audio.pause(); }
}

function go(i) {
  if (i < 0 || i >= TRACKS.length) return;
  loadTrack(i, true);
}

function seek(e) {
  if (!audio.duration) return;
  var r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}

audio.addEventListener('play', function() {
  document.getElementById('btnPlay').textContent = '⏸';
  renderQueue();
});
audio.addEventListener('pause', function() {
  document.getElementById('btnPlay').textContent = '▶';
  renderQueue();
});
audio.addEventListener('ended', function() {
  document.getElementById('btnPlay').textContent = '▶';
  if (cur < TRACKS.length - 1) setTimeout(function() { go(cur + 1); }, 500);
});
audio.addEventListener('timeupdate', function() {
  if (!audio.duration) return;
  document.getElementById('barFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
});

function renderQueue() {
  var list = document.getElementById('qList');
  list.innerHTML = '';
  TRACKS.forEach(function(t, i) {
    var d = document.createElement('div');
    d.className = 'item' + (i === cur ? ' cur' : '');
    var icon = audioData[i] === null ? '❌' : (i === cur ? (audio.paused ? '▶️' : '🔊') : '');
    d.innerHTML =
      '<div class="item-num">' + (i+1) + '</div>' +
      '<div class="item-body">' +
        '<div class="item-zh">' + t.zh + '</div>' +
        '<div class="item-kr">' + t.kr + '</div>' +
      '</div>' +
      '<div class="item-icon">' + icon + '</div>';
    d.onclick = (function(idx) { return function() { go(idx); }; })(i);
    list.appendChild(d);
  });
}

loadAll();
</script>
</body>
</html>
